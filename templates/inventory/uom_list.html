{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-between align-center mb-4">
        <h2 class="text-neon-cyan">{{ title }}</h2>
        <div>
            <a href="{% url 'inventory:uom_create' %}" class="btn btn-neon-cyan">➕ إضافة وحدة قياس</a>
        </div>
    </div>

    <table class="data-table">
        <thead>
            <tr>
                <th>الاسم</th>
                <th>إجراءات</th>
            </tr>
        </thead>
        <tbody>
            {% for uom in uoms %}
            <tr>
                <td>{{ uom.name }}</td>
                <td>
                    <a href="{% url 'inventory:uom_update' uom.pk %}" class="btn btn-sm btn-outline-cyan">تعديل</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="2" class="text-center">لا توجد وحدات قياس</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
