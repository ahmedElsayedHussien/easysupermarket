<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - EasySupermarket</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/design_system.css' %}">
    <style>
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-lg);
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-neon-cyan);
            text-align: center;
        }
        .login-card h1 {
            color: var(--neon-cyan);
            margin-bottom: 2rem;
            font-weight: 700;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: right;
        }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }
        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-default);
            color: var(--text-primary);
            border-radius: var(--radius-md);
            outline: none;
            transition: all 0.2s ease;
        }
        .form-control:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }
        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background: var(--neon-cyan);
            color: var(--bg-primary);
            border: none;
            border-radius: var(--radius-md);
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        .btn-login:hover {
            box-shadow: var(--shadow-neon-cyan);
            transform: translateY(-2px);
        }
        .error-message {
            color: var(--neon-red);
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>EASYSTORE</h1>
        
        {% if form.errors %}
        <div class="error-message">
            اسم المستخدم أو كلمة المرور غير صحيحة.
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" for="id_username">اسم المستخدم</label>
                <input type="text" name="username" class="form-control" id="id_username" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label" for="id_password">كلمة المرور</label>
                <input type="password" name="password" class="form-control" id="id_password" required>
            </div>
            
            <input type="hidden" name="next" value="{{ next|default:'/' }}">
            <button type="submit" class="btn-login">دخول</button>
        </form>
    </div>

</body>
</html>
