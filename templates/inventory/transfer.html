{% extends 'base.html' %}
{% block title %}تحويل مخزني{% endblock %}

{% block content %}
<div class="container-fluid">
    <h2 class="text-neon-cyan mb-4">تحويل مخزني (Stock Transfer)</h2>
    
    <div class="card p-4" style="max-width: 600px; margin: auto;">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group mb-3">
                <label class="form-label">المنتج</label>
                <select name="product_id" class="form-select" required id="productSelect">
                    <option value="">اختر المنتج...</option>
                    {% for p in products %}
                    <option value="{{ p.id }}">{{ p.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group mb-3">
                <label class="form-label">من مستودع</label>
                <select name="from_warehouse" class="form-select" required>
                    <option value="">اختر المستودع...</option>
                    {% for w in warehouses %}
                    <option value="{{ w.id }}">{{ w.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group mb-3">
                <label class="form-label">إلى مستودع</label>
                <select name="to_warehouse" class="form-select" required>
                    <option value="">اختر المستودع...</option>
                    {% for w in warehouses %}
                    <option value="{{ w.id }}">{{ w.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group mb-4">
                <label class="form-label">الكمية</label>
                <input type="number" name="quantity" class="form-control" step="0.01" required>
            </div>
            
            <div class="d-flex justify-between">
                <a href="{% url 'inventory:stock_list' %}" class="btn btn-ghost">إلغاء</a>
                <button type="submit" class="btn btn-neon-cyan">تأكيد التحويل</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
