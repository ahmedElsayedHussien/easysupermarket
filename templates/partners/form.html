{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <h2 class="text-neon-blue mb-4">{{ title }}</h2>
    
    <div class="card p-4" style="max-width: 600px; margin: auto;">
        <form method="POST">
            {% csrf_token %}
            {% if messages %}
            <div class="messages mb-4">
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} p-3 rounded" style="background: rgba(43, 255, 107, 0.1); border-right: 4px solid var(--neon-green);">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <!-- Form fields would be dynamically generated or hardcoded based on Partner model -->
            <div class="form-group mb-3">
                <label class="form-label">الاسم</label>
                <input type="text" name="name" class="form-control" value="{{ partner.name }}" required>
            </div>
            
            <div class="form-group mb-3">
                <label class="form-label">رقم الهاتف الأساسي</label>
                <input type="text" name="phone" class="form-control" value="{{ partner.phone }}">
            </div>

            <div class="form-group mb-3">
                <label class="form-label">رقم الهاتف الإضافي (الموبايل)</label>
                <input type="text" name="mobile" class="form-control" value="{{ partner.mobile }}">
            </div>

            <div class="form-group mb-3">
                <label class="form-label">البريد الإلكتروني</label>
                <input type="email" name="email" class="form-control" value="{{ partner.email }}">
            </div>

            <div class="form-group mb-3">
                <label class="form-label">الرقم القومي (اختياري)</label>
                <input type="text" name="national_id" class="form-control" value="{{ partner.national_id }}">
            </div>

            <div class="form-group mb-3">
                <label class="form-label">الرقم الضريبي</label>
                <input type="text" name="tax_id" class="form-control" value="{{ partner.tax_id }}">
            </div>
            
            <div class="form-group mb-3">
                <label class="form-label">نوع الشريك</label>
                <select name="partner_type" class="form-select">
                    <option value="CUSTOMER" {% if partner.partner_type == 'CUSTOMER' %}selected{% endif %}>عميل</option>
                    <option value="SUPPLIER" {% if partner.partner_type == 'SUPPLIER' %}selected{% endif %}>مورد</option>
                    <option value="BOTH" {% if partner.partner_type == 'BOTH' %}selected{% endif %}>الاثنين</option>
                </select>
            </div>
            
            <div class="d-flex justify-between mt-4">
                <a href="javascript:history.back()" class="btn btn-ghost">إلغاء</a>
                <button type="submit" class="btn btn-neon-blue">حفظ</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
